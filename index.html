<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfini AIXポータル</title>
    <style>
        /* Anfini コーポレートトーンのカラー定義 */
        :root {
            --bg-color: #0a0f1d;       /* 深みのある洗練されたダークネイビーブラック */
            --card-bg: #121829;        /* 落ち着いたトーンのカード背景 */
            --text-main: #ffffff;      /* 純白のメインテキスト */
            --text-muted: #8fa0ba;    /* 知的なシアン・グレーのサブテキスト */
            --accent-gold: #c5a880;   /* 高級感のあるアンフィニ・ゴールド */
            --accent-gold-light: #dfc59f; /* ホバー用の明るいゴールド */
            --border-color: rgba(197, 168, 128, 0.15); /* ゴールドをベースにした極細ボーダー */
        }
        
        * {
            box-sizing: border-box;
        }

        /* ページ全体のベース設定 */
        body {
            font-family: 'Times New Roman', "Yu Mincho", "遊明朝", "Hiragino Mincho ProN", serif;
            background: var(--bg-color);
            /* 中央上部から静かに広がる繊細なグラデーション光 */
            background-image: radial-gradient(circle at 50% 0%, rgba(197, 168, 128, 0.08), transparent 60%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* メインコンテンツを包むコンテナ */
        .portal-container {
            text-align: center;
            width: 100%;
            max-width: 960px;
            padding: 60px 24px;
        }

        /* ヘッダー（タイトル部分）の設定 */
        header {
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 300; /* 太すぎず洗練されたウェイトに */
            margin: 0;
            color: var(--text-main);
            letter-spacing: 6px; /* 文字間隔を広げてラグジュアリーに */
            text-transform: uppercase;
        }

        header p {
            color: var(--accent-gold);
            font-size: 0.95rem;
            font-weight: 400;
            margin-top: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* カードをまとめるラッパー */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        /* カード本体のデザイン */
        .card {
            background: var(--card-bg);
            border-radius: 8px; /* 角丸をシャープに抑える */
            padding: 40px 32px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            /* 滑らかでラグジュアリーな変遷効果 */
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        /* マウスを乗せたとき（ホバー）のアニメーション */
        .card:hover {
            transform: translateY(-4px); /* 浮き上がりは控えめにし、品を保つ */
            border-color: var(--accent-gold); /* 枠線がゴールドに美しく光る */
            background: #161e33; /* 背景を僅かに明るく */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* カード内のテキストやアイコンの設定 */
        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 24px;
            filter: grayscale(30%); /* 絵文字の彩度を少し落として馴染ませる */
        }
        
        .card-title {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0 0 14px 0;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }
        
        .card-desc {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.7;
            margin: 0 0 32px 0;
            font-weight: 300;
        }

        /* リンクボタン部分 */
        .card-link-text {
            color: var(--accent-gold);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: auto; /* ボタンを常に下部に固定 */
            transition: color 0.3s;
        }
        
        .card:hover .card-link-text {
            color: var(--accent-gold-light); /* ホバーで明るいゴールドに変化 */
        }

        /* 矢印アイコンの洗練化（細い矢印に） */
        .card-link-text::after {
            content: "→";
            font-family: serif;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .card:hover .card-link-text::after {
            transform: translateX(6px); /* 矢印が右に静かにスライド */
        }

        /* フッター */
        footer {
            margin-top: 80px;
            color: var(--text-muted);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <header>
            <h1>Anfini AIX</h1>
            <p>Apps Portal</p>
        </header>

        <div class="cards">
            <a href="https://anfini-aix-team.github.io/Event-Participant-Management/" class="card" target="_blank">
                <div class="card-icon">📅</div>
                <h2 class="card-title">イベント参加者変更管理</h2>
                <p class="card-desc">選考イベントの参加者の増減を管理するためのアプリケーションです。</p>
                <div class="card-link-text">Open App</div>
            </a>

            <a href="https://anfini-aix-team.github.io/Personal-Message-Generator/" class="card" target="_blank">
                <div class="card-icon">✉️</div>
                <h2 class="card-title">応募者メッセージ自動生成</h2>
                <p class="card-desc">応募者へのパーソナライズされたメッセージをAIで簡単に作成するアプリケーションです。</p>
                <div class="card-link-text">Open App</div>
            </a>
        </div>

        <footer>
            &copy; 2026 Anfini AIX Team. All rights reserved.
        </footer>
    </div>

</body>
</html>
